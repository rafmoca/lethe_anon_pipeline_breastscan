name: LetheUI Build

on:
  workflow_dispatch:
  push:
    branches:
      - "1-lethe-pipeline-gui"
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: "Lethe-UI"
            platform: "linux/amd64"
            os: "ubuntu-latest"
            nsis: false
          - name: "Lethe-UI.exe"
            platform: "windows/amd64"
            os: "windows-latest"
            nsis: true
          - name: "Lethe-UI"
            platform: "darwin/universal"
            os: "macos-latest"
            nsis: false

    runs-on: ${{ matrix.build.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Wails Build
        uses: dAppServer/wails-build-action@main
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          package: true
          wails-build-webview2: "embed"
          go-version: "1.25.4"
          app-working-directory: ${{ github.workspace }}/lethe_ui
          nsis: ${{ matrix.build.nsis }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Wails Build ${{ runner.os }} ${{ matrix.build.name }}
          path: ${{ github.workspace }}/lethe_ui/build/bin/**
          if-no-files-found: error
